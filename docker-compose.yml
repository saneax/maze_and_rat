services:
  maze-and-rat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maze-and-rat
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    # Optional: mount static files for development
    # volumes:
    #   - ./static:/app/static:ro

  # Optional: nginx reverse proxy for production
  # nginx:
  #   image: nginx:alpine
  #   container_name: maze-and-rat-nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - maze-and-rat
  #   restart: unless-stopped

networks:
  default:
    name: maze-and-rat-network